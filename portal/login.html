<style>
  :root {
    --coral: #E5664A; --cream: #FDF4E8; --ink: #2A1F1A;
    --body: #5C4A3F; --muted: #8B7A6D; --radius: 16px;
    --shadow: 0 12px 40px rgba(160,100,70,.16);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif; color: var(--body);
    background: radial-gradient(80% 60% at 50% 0%, #FFE9D8 0%, transparent 55%), var(--cream);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--ink); }
  .logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .tabs { display: flex; background: var(--cream); border-radius: 999px; padding: 4px; margin-bottom: 32px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all .2s; }
  .tab.active { background: #fff; color: var(--coral); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  input { width: 100%; padding: 12px 16px; border: 1.5px solid #E8DDD5; border-radius: var(--radius); font-size: 15px; font-family: 'Inter', sans-serif; color: var(--ink); background: #fff; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--coral); }
  .btn { width: 100%; padding: 14px; background: var(--coral); color: #fff; border: none; border-radius: 999px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s, transform .15s; margin-top: 8px; }
  .btn:hover { background: #C24E36; transform: translateY(-1px); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .msg { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 14px; display: none; }
  .msg.error { background: #FEE8E4; color: #C24E36; display: block; }
  .msg.success { background: #E8F5EE; color: #1A7A4A; display: block; }
  .back-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
  .back-link a { color: var(--coral); font-weight: 600; }
  .trust-badge { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:28px; padding-top:20px; border-top:1px solid #F0E8E0; font-size:12px; color:#a08878; }
  .trust-badge svg { width:14px; height:14px; flex-shrink:0; }
  .page-footer { text-align:center; margin-top:20px; font-size:12px; color:#b8a89a; line-height:1.8; }
  .page-footer a { color:#a08878; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Freelance LeadsHub</h1>
    <p>Your business leads portal</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Log In</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group"><label>Email Address</label><input type="email" id="loginEmail" placeholder="you@example.com" required/></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" required/></div>
    <button class="btn" type="submit" id="loginBtn">Log In</button>
    <div class="msg" id="loginMsg"></div>
  </form>

  <form id="signupForm" style="display:none" onsubmit="handleSignup(event)">
    <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name" required/></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="signupEmail" placeholder="you@example.com" required/></div>
    <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="At least 8 characters" minlength="8" required/></div>
    <button class="btn" type="submit" id="signupBtn">Create Account</button>
    <div class="msg" id="signupMsg"></div>
  </form>

  <div class="back-link"><a href="../index.html">← Back to freelanceleadshub.shop</a></div>

  <div class="trust-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Secured by Supabase · Official portal of freelanceleadshub.shop
  </div>
</div>

  Questions? <a href="https://wa.me/2348025289203">WhatsApp +234 802 528 9203</a> · <a href="mailto:freelanceleadshub@gmail.com">freelanceleadshub@gmail.com</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL  = 'https://ezninmuueoojvrwyxakm.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6bmlubXV1ZW9vanZyd3l4YWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDE5ODEsImV4cCI6MjA5ODgxNzk4MX0.YSKWeQ2HlrrxxXDHvzQEHHsieMMtbdSVQRN1zNM2IqM'; // paste anon key here
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('loginForm').style.display  = tab === 'login'  ? '' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Logging in…';

    const { data, error } = await sb.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value,
    });

    if (error) {
      showMsg('loginMsg', 'Invalid email or password.', 'error');
      btn.disabled = false; btn.textContent = 'Log In';
      return;
    }

    localStorage.setItem('flh_token', data.session.access_token);
    localStorage.setItem('flh_user', JSON.stringify({
      id: data.user.id,
      email: data.user.email,
      full_name: data.user.user_metadata?.full_name,
    }));
    window.location.href = 'dashboard.html';
  }

  async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Creating account…';

    const { error } = await sb.auth.signUp({
      email: document.getElementById('signupEmail').value,
      password: document.getElementById('signupPassword').value,
      options: { data: { full_name: document.getElementById('signupName').value } },
    });

    if (error) {
      showMsg('signupMsg', error.message, 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
      return;
    }

    showMsg('signupMsg', 'Account created! You can now log in.', 'success');
    btn.disabled = false; btn.textContent = 'Create Account';
    setTimeout(() => switchTab('login'), 1500);
  }

  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
